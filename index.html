<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      /* Animated background */
      background: linear-gradient(-45deg, #0f172a, #1e293b, #0ea5e9, #38bdf8);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 3em;
      margin: 0;
    }

    p {
      color: #cbd5e1;
      font-size: 1.2em;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #38bdf8;
      color: black;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #0ea5e9;
    }

    section {
      padding: 40px 20px;
    }

    .card {
      background: #111827;
      margin: 10px auto;
      padding: 20px;
      max-width: 500px;
      border-radius: 10px;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <header>
      <h1>Hi, I'm Perwd</h1>
    <p>Welcome to my website 🚀</p>
    <p>I make mincraft stuff</p>
    <a class="btn" href="#projects">View Projects</a>
  </header>

  <section id="projects">
    <h2>My Projects</h2>

    <div class="card">
      Project 1 - Add something here
    </div>

    <div class="card">
      Project 2 - Add something here
    </div>

</body>
</html>
