<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Name</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #020617;
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
        }

        header h1 {
            margin: 0;
            font-weight: 700;
        }

        nav a {
            color: #38bdf8;
            margin: 0 10px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            padding: 80px 20px;
            text-align: center;
        }

        .hero h2 {
            font-size: 2.5em;
        }

        .hero p {
            max-width: 600px;
            margin: 20px auto;
            color: #94a3b8;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #38bdf8;
            color: #020617;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1e293b;
            margin-top: 40px;
            font-size: 0.9em;
            color: #64748b;
        }
    </style>
</head>

<body>

<header>
    <h1>Your Name</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Welcome to my website 👋</h2>
    <p>This is a simple GitHub Pages site. You can edit this text and start building your own project or portfolio.</p>
    <a href="#" class="btn">Get Started</a>
</section>

<footer>
    <p>© 2026 Your Name. Built with GitHub Pages.</p>
</footer>

</body>
</html>
